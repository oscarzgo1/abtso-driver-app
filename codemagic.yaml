workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
    scripts:
      - name: Unzip project folder
        script: |
          # Automatically extract the project source code if uploaded as a zip
          if [ -f "driver_app.zip" ]; then
            unzip -o driver_app.zip
          fi
      - name: Get Flutter packages
        script: |
          cd driver_app
          flutter packages pub get
      - name: Build Android APK
        script: |
          cd driver_app
          flutter build apk --release
    artifacts:
      - driver_app/build/app/outputs/flutter-apk/app-release.apk
